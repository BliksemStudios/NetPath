name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Build
        run: xcodebuild build -scheme NetPath -destination 'platform=macOS' -configuration Debug

      - name: Test
        run: xcodebuild test -scheme NetPath -destination 'platform=macOS' -configuration Debug
